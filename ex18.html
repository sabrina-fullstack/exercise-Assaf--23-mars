<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1> Lis 10 nombres et affiche la somme des éléments entre 20 et 50.</h1>
    <script>
      let arr = [];
      let sum = 0;

      for (let i = 0; i < 10; i++) {
        arr[i] = Number(prompt("enter number"));
      }

      for (let i = 0; i < 10; i++) {
        if (arr[i] > 20 && arr[i] < 50) {
          sum += arr[i];
        }
      }

      console.log(sum);
    </script>
  </body>
</html>
