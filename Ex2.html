<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width
  , initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Lis 5 nombres dans un tableau avec une boucle for</h1>
  <script>
    // declarer le tableau
    let arr = [];
    // la boucle for 
    for (let i = 0; i < 5; i++) {
      arr[i] = Number(prompt("entrer un nombre"));
    }
    for (let i = 0; i < 5; i++) {
      console.log(arr[i]);
    }
  </script>
</body>
</html>
