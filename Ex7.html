<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      Lis 10 nombres et affiche seulement les éléments aux positions impaires
      (1, 3, 5...)
    </h1>
    <script>
      let arr = [];

      for (let i = 0; i < 10; i++) {
        arr[i] = Number(prompt("enter number"));
      }

      for (let i = 0; i < 10; i++) {
        if (i % 2 == 1) {
          console.log(arr[i]);
        }
      }
    </script>
  </body>
</html>
