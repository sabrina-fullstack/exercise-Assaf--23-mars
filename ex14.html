<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Lis 15 nombres et affiche la somme de tous les éléments.</h1>
    <script>
      let arr = [];
      let sum = 0;

      for (let i = 0; i < 15; i++) {
        arr[i] = Number(prompt("enter number"));
      }

      for (let i = 0; i < 15; i++) {
        sum += arr[i];
      }

      console.log(sum);
    </script>
  </body>
</html>
