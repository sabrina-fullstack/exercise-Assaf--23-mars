<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      👉 Lis 5 nombres dans a et 5 nombres dans b. Si la somme de a est plus grande que la somme de b, affiche a, sinon affiche b.
    </h1>
    <script>
      let tab1 = [];       // on additionne tous les nombres de tab1 - tab1 = [1, 2, 3, 4, 5] → sum1 = 15
      let tab2 = [];      // on additionne tous les nombres de tab2 - tab2 = [2, 2, 2, 2, 2] → sum2 = 10
     
      let sum1 = 0;         // caisse vide au départ a cause du 0
      let sum2 = 0;

      for (let i = 0; i < 5; i++) {
        tab1[i] = Number(prompt("entrer un nombre"));
      }

      for (let i = 0; i < 5; i++) {
        tab2[i] = Number(prompt("entrer un nombre"));
      }

      for (let i = 0; i < 5; i++) {
        sum1 += tab1[i]; // c'est pareil que sum1 = sum1 + tab1[i]

        sum2 += tab2[i];
      }

      console.log(sum1 > sum2 ? "a" : "b");
      
    </script>
  </body>
</html>
