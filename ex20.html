<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Lis 10 nombres et affiche le minimum..</h1>
    <script>
      let arr = [];

      for (let i = 0; i < 10; i++) {
        arr[i] = Number(prompt("enter number"));
      }
      let min = arr[0];

      for (let i = 0; i < 10; i++) {
        if (arr[i] < min) {
          min = arr[i];
        }
      }

      console.log(min);
    </script>
  </body>
</html>
