  <body>
    <h1>Lis 10 nombres et affiche la somme des nombres aux places impaires</h1>
    <script>
      // Lis 10 nombres dans un tableau. Affiche le nombres d'elements positifs

      const tab = [1, -2, 3, 4, -5, 0, 7, -8, 9, 10];
      let compteur = 0;
      for (let i = 0; i < tab.length; i++) {
        if (tab[i] > 0) {
          compteur++;
        }
      }
      console.log(compteur);
    </script>
  </body>
